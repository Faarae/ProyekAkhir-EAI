version: '3.8'

services:
  # Database
  mysql:
    image: mysql:8.0
    container_name: rsu-mysql
    environment:
      MYSQL_ROOT_PASSWORD: "@Ghiffar0001"  # Disamakan dengan password lokalmu
      MYSQL_DATABASE: db_admin
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    volumes:
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - rsu-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p@Ghiffar0001"] # Password disesuaikan
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Message Broker
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: rsu-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"      # AMQP port
      - "15672:15672"    # Management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - rsu-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Admin Service
  admin-service:
    build:
      context: ./admin-service
      dockerfile: Dockerfile
    container_name: rsu-admin-service
    ports:
      - "8081:8081"
    environment:
      PORT: 8081
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/db_admin?useSSL=false&serverTimezone=Asia/Jakarta&allowPublicKeyRetrieval=true
      DB_USERNAME: root
      DB_PASSWORD: "@Ghiffar0001"
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - rsu-network
    restart: unless-stopped

  # Medical Service
  medical-service:
    build:
      context: ./medical-service
      dockerfile: Dockerfile
    container_name: rsu-medical-service
    ports:
      - "8082:8082"
    environment:
      PORT: 8082
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/db_medical?useSSL=false&serverTimezone=Asia/Jakarta&allowPublicKeyRetrieval=true
      DB_USERNAME: root
      DB_PASSWORD: "@Ghiffar0001"
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - rsu-network
    restart: unless-stopped

  # Pharmacy Service
  pharmacy-service:
    build:
      context: ./pharmacy-service
      dockerfile: Dockerfile
    container_name: rsu-pharmacy-service
    ports:
      - "8083:8083"
    environment:
      PORT: 8083
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/db_pharmacy?useSSL=false&serverTimezone=Asia/Jakarta&allowPublicKeyRetrieval=true
      DB_USERNAME: root
      DB_PASSWORD: "@Ghiffar0001"
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - rsu-network
    restart: unless-stopped

  # Payment Service
  payment-service:
    build:
      context: ./payment-service
      dockerfile: Dockerfile
    container_name: rsu-payment-service
    ports:
      - "8084:8084"
    environment:
      PORT: 8084
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/db_payment?useSSL=false&serverTimezone=Asia/Jakarta&allowPublicKeyRetrieval=true
      DB_USERNAME: root
      DB_PASSWORD: "@Ghiffar0001"
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - rsu-network
    restart: unless-stopped

networks:
  rsu-network:
    driver: bridge

volumes:
  mysql_data:
  rabbitmq_data: